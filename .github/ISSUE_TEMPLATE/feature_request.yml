name: Feature request
description: Suggest an idea or improvement for Spacey
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point this feature would address.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like Spacey to do.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
    validations:
      required: false

  - type: checkboxes
    id: no-sip
    attributes:
      label: Design boundary
      description: >
        Spacey is intentionally a no-SIP app: it does not require disabling
        System Integrity Protection and does not inject into the Dock or other
        system processes. Features that depend on disabling SIP or on
        Dock/process injection are out of scope.
      options:
        - label: This feature can work without disabling SIP or injecting into the Dock / system processes.
          required: true
