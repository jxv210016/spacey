name: Bug report
description: Report something that isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: "Output of `sw_vers -productVersion` (these private APIs vary across builds)."
      placeholder: "e.g. 14.6.1"
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac model / chip
      placeholder: "e.g. MacBook Pro M3"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Spacey version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
