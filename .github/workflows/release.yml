# Release workflow — builds Spacey, zips the .app, and attaches it to a GitHub
# Release on tag push. NO code-signing or notarization, so NO secrets are required.
#
# The published build is unsigned (ad-hoc), so after downloading users clear the
# Gatekeeper quarantine with `xattr -dr com.apple.quarantine` (see the README and
# docs/RELEASING.md). The in-app UpdateChecker reads the latest release tag and links
# to the attached Spacey.zip asset.
#
# Tag-gated so it only runs for a maintainer pushing `vX.Y.Z` — never on branch pushes
# or PRs.
name: Release

on:
  push:
    tags:
      - "v*" # e.g. v0.1.0, v1.2.3

permissions:
  contents: write # needed to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish zip
    runs-on: macos-15
    env:
      APP_NAME: Spacey
      SCHEME: Spacey
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, unsigned)
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package zip
        id: package
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/${CONFIGURATION}/${APP_NAME}.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: built app not found at $APP_PATH" >&2
            exit 1
          fi
          VERSION="$(/usr/bin/defaults read "$PWD/$APP_PATH/Contents/Info" CFBundleShortVersionString 2>/dev/null || echo 0.0.0)"
          # Fixed asset name ("Spacey.zip") so the release/latest/download URL is stable
          # across versions. ditto preserves the bundle (symlinks/resource forks) exactly.
          /usr/bin/ditto -c -k --keepParent "$APP_PATH" "${APP_NAME}.zip"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: ${{ env.APP_NAME }}.zip
        # GITHUB_TOKEN is provided automatically; permissions: contents: write above.
