included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

disabled_rules:
  - todo                 # we track TODOs deliberately during early development
  - trailing_comma       # SwiftFormat manages commas

opt_in_rules:
  - empty_count
  - force_unwrapping
  - explicit_init
  - first_where
  - sorted_first_last

line_length:
  warning: 120
  error: 200
  ignores_comments: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - di
    - n
    - i
    - u

type_name:
  min_length: 3
